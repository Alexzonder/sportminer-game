<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SportMiner - Тест</title>
    <style>
        /* --- НОВЫЙ ДИЗАЙН (ТЕМНАЯ ТЕМА) --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111; /* Очень тёмный фон */
            color: #e0e0e0; /* Светло-серый текст */
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: rgba(25, 25, 25, 0.9);
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            max-width: 480px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #00e676; /* Неоновый зелёный */
            margin-bottom: 25px;
            font-size: 28px;
        }
        .btn-start {
             background-color: #ff9800; /* Оранжевый для главной кнопки */
             color: white;
             border: none;
             padding: 16px;
             font-size: 18px; 
             cursor: pointer;
             border-radius: 30px;
             transition: all 0.2s ease-in-out;
             box-shadow: 0 4px 8px rgba(255,152,0,0.4);
             display: block; 
             width: calc(100% - 32px);
             margin-left: auto;
             margin-right: auto; 
             margin-top: 25px; 
        }
        .btn-start:hover {
             background-color: #f57c00; 
             transform: translateY(-2px);
             box-shadow: 0 8px 16px rgba(255,152,0,0.5);
        }
        .match { background: rgba(30, 30, 30, 0.85); margin-bottom: 25px; padding: 20px; border-radius: 12px; border-left: 4px solid #00e676; }
        .question { font-weight: bold; margin-bottom: 15px; color: #ddd; }
        .answer-btn { display: block; width: 100%; padding: 14px; margin-bottom: 12px; border: none; border-radius: 10px; background-color: #2a2a2a; color: white; font-size: 17px; cursor: pointer; transition: all 0.2s ease-in-out; }
        .answer-btn:hover { background-color: #444; }
        .balance { text-align: right; font-size: 22px; color: #00e676; font-weight: bold; margin-bottom: 35px; }
        #result { margin-top: 25px; padding-top: 18px; border-top: 2px dashed rgba(0, 230, 118, 0.4); font-size: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>SportMiner</h1>

    <!-- ЭТОТ БЛОК ПОКАЗЫВАЕТСЯ СРАЗУ -->
    <div id="onboarding-div" style="text-align: center; margin-bottom: 30px; display: none;">
        <h1>СПОРТКОИН</h1>
        <p>Проект СПОРТМАЙНЕР приветствует тебя!</p>
        <p>Здесь твои знания спорта превращаются в монеты.</p>
        <button class="btn-start" id="start-btn">Начать!</button>
    </div>

    <!-- ЭТОТ БЛОК ПОКАЗЫВАЕТСЯ ПОСЛЕ НАЖАТИЯ "НАЧАТЬ!" -->
    <div id="sport-selection" class="match" style="display: none;">
        <p class="question">Выбери дисциплину:</p>
        <button class="answer-btn" onclick="selectSport('Футбол')">Футбол</button>
        <button class="answer-btn" onclick="selectSport('Хоккей')">Хоккей</button>
        <button class="answer-btn" onclick="selectSport('Баскетбол')">Баскетбол</button>
        <button class="answer-btn" onclick="selectSport('Киберспорт')">Киберспорт</button>
    </div>

    <div class="balance" id="main-balance" style="display: none;">Баланс: <span id="balance">1399.2</span> СПОРТКОИН</div>

    <div class="match" id="match-container">
        <!-- Здесь будут матчи выбранного спорта -->
    </div>

    <div id="result"></div>
</div>

<script>
// --- НАЧАЛО ЛОГИКИ -- ФИНАЛЬНАЯ ВЕРСИЯ ---
let balance = parseFloat(1399.2);
let currentMatch = null;
let matches = [];
let selectedSport = null;

const updateBalanceDisplay = () => {
    document.getElementById('balance').textContent = balance.toFixed(1);
};

// --- ФУНКЦИЯ форматирования даты (ИСПРАВЛЕННАЯ) ---
function formatDate(datetimeStr) {
    const now = new Date();
    const matchDate = new Date(datetimeStr);
    
    // Проверяем, совпадает ли год, месяц и день матча с сегодняшним днем
    const isToday = (
        now.getFullYear() === matchDate.getFullYear() &&
        now.getMonth() === matchDate.getMonth() &&
        now.getDate() === matchDate.getDate()
    );

    if (isToday) {
        return `Сегодня в ${matchDate.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})}`;
    } else {
        // Используем padStart для добавления ведущих нулей (например, "04" вместо "4")
        const day = String(matchDate.getDate()).padStart(2, '0');
        const month = String(matchDate.getMonth() + 1).padStart(2, '0'); // Месяцы с 0 до 11
        
        return `${day}.${month} в ${matchDate.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})}`;
    }
}

// --- ФУНКЦИЯ загрузки данных ---
async function fetchMatches() {
    try {
        const response = await fetch('matches.json');
        
        if (!response.ok) {
            throw new Error("Ошибка загрузки данных.");
        }
        
        const data = await response.json();
        
        // Фильтруем и сортируем
        const filteredData = data.filter(item => item.sport.toLowerCase() === selectedSport.toLowerCase())
                                 .sort((a, b) => new Date(a.datetime) - new Date(b.datetime));
        
        return filteredData;
        
    } catch (error) {
        console.error("Ошибка загрузки:", error);
        alert("Не удалось загрузить матчи. Проверь интернет и файл matches.json.");
        return [];
    }
}

// --- ФУНКЦИЯ выбора спорта ---
async function selectSport(sport) {
    selectedSport = sport;
    
    document.getElementById('sport-selection').style.display = 'none';
    document.getElementById('main-balance').style.display = 'block';
    
    showLoadingScreen();
    
    matches = await fetchMatches(); 
    
    if (matches.length === 0) {
        alert("По данному спорту нет доступных матчей.");
        document.getElementById('sport-selection').style.display = 'block';
        document.getElementById('main-balance').style.display = 'none';
        return;
    }
    
    showMatch();
}

function showLoadingScreen() {
    const container = document.getElementById('match-container');
    container.innerHTML = '<p style="color: #00e676; text-align: center; font-size: 20px;">Загрузка матчей...</p>';
}

// --- ФУНКЦИЯ показа списка матчей (ИСПРАВЛЕННАЯ) ---
function showMatch() {
    const container = document.getElementById('match-container');
    container.innerHTML = '';

    if (matches.length === 0) {
         const restartBtn = document.createElement('button');
         restartBtn.className = 'btn-start';
         restartBtn.textContent = 'Выбрать другой спорт';
         
         restartBtn.onclick = () => {
             matches = [];
             document.getElementById('sport-selection').style.display = 'block';
             document.getElementById('main-balance').style.display = 'none';
             document.getElementById('match-container').innerHTML = '';
         };
         container.appendChild(restartBtn);
         return;
     }

     // Используем цикл for для стабильной работы с индексами
     for (let i = matches.length - 1; i >= 0; i--) { // Обратный цикл для безопасности splice
         const matchData = matches[i];
         const matchDiv = document.createElement('div');
         matchDiv.className = 'match';
         matchDiv.style.marginBottom = '15px';

         const timeString = formatDate(matchData.datetime);

         matchDiv.innerHTML = `
             <p><strong>${matchData.home_team} vs ${matchData.away_team}</strong></p>
             <p style="color: #aaa; font-size: 14px;">Начало: ${timeString}</p>
         `;

         const button = document.createElement('button');
         button.className = 'answer-btn';
         button.textContent = 'Сделать ставку';
         
         // Передаем индекс для удаления
         button.onclick = () => loadBetScreen(i); 
         
         matchDiv.appendChild(button);
         container.appendChild(matchDiv);
     }
}

// --- ФУНКЦИЯ экрана ставок (ИСПРАВЛЕННАЯ) ---
function loadBetScreen(index) {
    // Удаляем матч из массива по индексу и сохраняем его в currentMatch
    currentMatch = matches.splice(index, 1)[0];
    
    const container = document.getElementById('match-container');
    container.innerHTML = '';

    const matchDiv = document.createElement('div');
    matchDiv.className = 'match';

    matchDiv.innerHTML = `
        <p><strong>${selectedSport}</strong>: ${currentMatch.home_team} vs ${currentMatch.away_team}</p>
        <p class="question">${currentMatch.question}</p>
    `;

    currentMatch.answers.forEach((answer) => {
        const button = document.createElement('button');
        button.className = 'answer-btn';
        button.textContent = answer;
        
        // Передаем индекс ответа при клике
        button.onclick = makeBet.bind(null, currentMatch.answers.indexOf(answer));
            
        matchDiv.appendChild(button);
    });

    container.appendChild(matchDiv);
}
 
function makeBet(selectedIndex) {
    const COST = 0.1;

    if (balance < COST) {
        alert("Недостаточно СПОРТКОИН для ставки!");
        return;
    }

    balance -= COST;
    
    // Генерируем случайный результат в пределах доступных ответов
    const resultIndex = Math.floor(Math.random() * currentMatch.answers.length); 
    
    const isWin = (selectedIndex === resultIndex);

    const resultDiv = document.getElementById('result');
    
    if (isWin) {
         const POOL = 100;
         balance += POOL;
         resultDiv.innerHTML = `<p class="win">🎉 Поздравляем! Вы угадали! Награда +${POOL} СПОРТКОИН.</p>`;
     } else {
         resultDiv.innerHTML = `<p class="lose">😞 Не угадали. Комиссия сожжена.</p>`;
     }
    
    updateBalanceDisplay();

    setTimeout(() => {
        resultDiv.innerHTML = '';
        showMatch(); // Возвращаемся к обновленному списку матчей
    }, 1500);
}

// --- ИНИЦИАЛИЗАЦИЯ ---
document.getElementById('onboarding-div').style.display = 'block';
document.getElementById('start-btn').addEventListener('click', () => {
    document.getElementById('onboarding-div').style.display = 'none';
    document.getElementById('sport-selection').style.display = 'block';
});
updateBalanceDisplay();
</script>
</body>
</html>
