<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SportMiner - Тест</title>
    <style>
        /* --- НОВЫЙ ДИЗАЙН (ТЕМНАЯ ТЕМА) --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111; /* Очень тёмный фон */
            color: #e0e0e0; /* Светло-серый текст */
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: rgba(25, 25, 25, 0.9);
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            max-width: 480px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #00e676; /* Неоновый зелёный */
            margin-bottom: 25px;
            font-size: 28px;
        }
        .btn-start {
             background-color: #ff9800; /* Оранжевый для главной кнопки */
             color: white;
             border: none;
             padding: 16px;
             font-size: 18px; 
             cursor: pointer;
             border-radius: 30px;
             transition: all 0.2s ease-in-out;
             box-shadow: 0 4px 8px rgba(255,152,0,0.4);
             display: block; 
             width: calc(100% - 32px);
             margin-left: auto;
             margin-right: auto; 
             margin-top: 25px; 
        }
        .btn-start:hover {
             background-color: #f57c00; 
             transform: translateY(-2px);
             box-shadow: 0 8px 16px rgba(255,152,0,0.5);
        }
        .match { background: rgba(30, 30, 30, 0.85); margin-bottom: 25px; padding: 20px; border-radius: 12px; border-left: 4px solid #00e676; }
        .question { font-weight: bold; margin-bottom: 15px; color: #ddd; }
        .answer-btn { display: block; width: 100%; padding: 14px; margin-bottom: 12px; border: none; border-radius: 10px; background-color: #2a2a2a; color: white; font-size: 17px; cursor: pointer; transition: all 0.2s ease-in-out; }
        .answer-btn:hover { background-color: #444; }
        .balance { text-align: right; font-size: 22px; color: #00e676; font-weight: bold; margin-bottom: 35px; }
        #result { margin-top: 25px; padding-top: 18px; border-top: 2px dashed rgba(0, 230, 118, 0.4); font-size: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>SportMiner</h1>

    <!-- Блок онбординга (появляется ПЕРВЫМ и ВИДЕН при загрузке) -->
    <div id="onboarding-div" style="text-align:center; margin-bottom:30px;"> 
        <h1>СПОРТКОИН</h1>
        <p>Проект СПОРТМАЙНЕР приветствует тебя!</p>
        <p>Здесь твои знания спорта превращаются в монеты.</p>
        <button class="btn-start" id="start-btn">Начать!</button>
    </div>

    <!-- БЛОК ВЫБОРА СПОРТА -->
    <div id="sport-selection" class="match" style="display:none; margin-bottom:35px;"> 
        <p class="question">Выбери дисциплину:</p>
        <button class="answer-btn" onclick="selectSport('Футбол')">Футбол</button>
        <button class="answer-btn" onclick="selectSport('Хоккей')">Хоккей</button>
        <button class="answer-btn" onclick="selectSport('Баскетбол')">Баскетбол</button>
        <button class="answer-btn" onclick="selectSport('Киберспорт')">Киберспорт</button>
    </div>

    <!-- Блок баланса -->
    <div class="balance" id="main-balance" style="display:none;">Баланс: <span id="balance">1399.2</span> СПОРТКОИН</div>

    <!-- Контейнер для матчей или заглушки -->
    <div class="match" id="match-container">
    </div>

    <!-- Зеленый пунктир -->
    <div id="result"></div>
</div>

<script>
// --- НАЧАЛО ЛОГИКИ -- ПОЛНОСТЬЮ ПЕРЕПИСАНО ---
let balance = parseFloat(1399.2);
let currentMatch = null;
let matches = [];
let selectedSport = null;

const updateBalanceDisplay = () => {
    document.getElementById('balance').textContent = balance.toFixed(1);
};

// --- ФУНКЦИЯ форматирования даты ---
function formatDate(datetimeStr) {
    const now = new Date();
    const matchDate = new Date(datetimeStr);
    
    if (
        now.getDate() === matchDate.getDate() &&
        now.getMonth() === matchDate.getMonth() &&
        now.getFullYear() === matchDate.getFullYear()
    ) {
        return `Сегодня в ${matchDate.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})}`;
    }
    
    const day = String(matchDate.getDate()).padStart(2, '0');
    const month = String(matchDate.getMonth() + 1).padStart(2, '0');
    return `${day}.${month} в ${matchDate.toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'})}`;
}

// --- ЗАГЛУШКА ДАННЫХ ---
async function fetchMatches() {
    await new Promise(resolve => setTimeout(resolve, 500));
    return [{
        sport: "Футбол",
        home_team: "Зенит",
        away_team: "Спартак",
        datetime: "2025-04-04T19:00:00",
        question: "Кто победит?",
        answers: ["Зенит", "Ничья", "Спартак"],
        resultIndex: Math.floor(Math.random() * 3)
    }];
}

// --- ФУНКЦИЯ выбора спорта ---
function selectSport(sport) {
    selectedSport = sport;
    
    // Прячем выбор спорта
    document.getElementById('sport-selection').style.display = 'none';
    
    // Если выбран Футбол - показываем баланс и грузим матч
    if (sport === 'Футбол') {
         document.getElementById('main-balance').style.display = 'block';
         showLoadingScreen();
         matches = fetchMatches(); 
         showMatch(); 
     } else {
         // Если выбрано другое - скрываем баланс и показываем заглушку
         document.getElementById('main-balance').style.display = 'none';
         showEmptyScreen();
     }
}

function showLoadingScreen() {
    const container = document.getElementById('match-container');
    container.innerHTML = '<p style="color: #00e676; text-align: center; font-size: 20px;">Загрузка матча...</p>';
}

function showMatch() {
    const container = document.getElementById('match-container');
    container.innerHTML = '';

    if (matches.length === 0) {
         const restartBtn = document.createElement('button');
         restartBtn.className = 'btn-start';
         restartBtn.textContent = 'Выбрать другой спорт';
         restartBtn.onclick = () => {
             matches = [];
             document.getElementById('sport-selection').style.display = 'block';
             document.getElementById('main-balance').style.display = 'none';
             document.getElementById('match-container').innerHTML = '';
         };
         container.appendChild(restartBtn);
         return;
     }

     currentMatch = matches.shift();
     const matchDiv = document.createElement('div');
     matchDiv.className = 'match';
     const timeString = formatDate(currentMatch.datetime);

     matchDiv.innerHTML = `
         <p><strong>${currentMatch.sport}</strong>: ${currentMatch.home_team} vs ${currentMatch.away_team}</p>
         <p style="color: #aaa; font-size: 14px;">Начало: ${timeString}</p>
         <p class="question">${currentMatch.question}</p>
     `;

     currentMatch.answers.forEach((answer, index) => {
         const button = document.createElement('button');
         button.className = 'answer-btn';
         button.textContent = answer;
         button.onclick = () => makeBet(index);
         matchDiv.appendChild(button);
     });

     container.appendChild(matchDiv);
}

// --- ФУНКЦИЯ экрана "Здесь пока пусто" ---
function showEmptyScreen() {
    const container = document.getElementById('match-container');
    container.innerHTML = '';

    const emptyDiv = document.createElement('div');
    emptyDiv.className = 'match';
    emptyDiv.innerHTML = `
        <p style="color:#aaa; text-align:center; font-size:18px;">ЗДЕСЬ ПОКА ПУСТО</p>
        <p style="color:#aaa; text-align:center; font-size:16px;">Данная дисциплина находится в разработке.</p>
    `;
    
    const backBtn = document.createElement('button');
    backBtn.className = 'btn-start';
    backBtn.textContent = 'НАЗАД';
    backBtn.style.marginTop = '25px';
    
    backBtn.onclick = () => {
         // Возвращаемся на страницу выбора дисциплины
         document.getElementById('sport-selection').style.display = 'block';
         
         // Очищаем контейнер матча и скрываем баланс/результат
         document.getElementById('match-container').innerHTML = '';
         document.getElementById('main-balance').style.display = 'none';
         document.getElementById('result').innerHTML = '';
     };
    
     container.appendChild(emptyDiv);
}


function makeBet(selectedIndex) {
    const COST = 0.1;

    if (balance < COST) {
        alert("Недостаточно СПОРТКОИН для ставки!");
        return;
    }

    balance -= COST;
    const isWin = (selectedIndex === currentMatch.resultIndex);

    const resultDiv = document.getElementById('result');
    
    if (isWin) {
         const POOL = 100;
         balance += POOL;
         resultDiv.innerHTML = `<p class="win">🎉 Поздравляем! Вы угадали! Награда +${POOL} СПОРТКОИН.</p>`;
     } else {
         resultDiv.innerHTML = `<p class="lose">😞 Не угадали. Комиссия сожжена.</p>`;
     }
    
    updateBalanceDisplay();

    setTimeout(() => {
        resultDiv.innerHTML = '';
        showMatch(); 
    }, 1500);
}


// --- ГЛАВНАЯ ЛОГИКА ЗАПУСКА ---
// Прячем всё при старте (кроме онбординга)
document.querySelector('.balance').style.display = 'none';
document.querySelector('#match-container').style.display = 'none';
document.getElementById('result').style.display = 'none'; 

// Логика кнопки "Начать!"
document.getElementById('start-btn').addEventListener('click', () => {
    document.getElementById('onboarding-div').style.display = 'none';
    document.getElementById('sport-selection').style.display = 'block'; 
});


updateBalanceDisplay();
</script>
</body>
</html>
