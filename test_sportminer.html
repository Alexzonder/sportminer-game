<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SportMiner - Тест</title>
    <style>
        /* --- НОВЫЙ ДИЗАЙН (ТЕМНАЯ ТЕМА) --- */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #111; color: #e0e0e0; margin: 0; padding: 40px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: rgba(25, 25, 25, 0.9); padding: 35px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); max-width: 480px; width: 100%; }
        h1 { text-align: center; color: #00e676; margin-bottom: 25px; font-size: 28px; }
        .btn-start { background-color: #ff9800; color: white; border: none; padding: 16px; font-size: 18px; cursor: pointer; border-radius: 30px; transition: all 0.2s ease-in-out; box-shadow: 0 4px 8px rgba(255,152,0,0.4); display: block; width: calc(100% - 32px); margin-left: auto; margin-right: auto; margin-top: 25px; }
        .btn-start:hover { background-color: #f57c00; transform: translateY(-2px); box-shadow: 0 8px 16px rgba(255,152,0,0.5); }
        .match { background: rgba(30, 30, 30, 0.85); margin-bottom: 25px; padding: 20px; border-radius: 12px; border-left: 4px solid #00e676; }
        .question { font-weight: bold; margin-bottom: 15px; color: #ddd; }
        .answer-btn { display: block; width: 100%; padding: 14px; margin-bottom: 12px; border: none; border-radius: 10px; background-color: #2a2a2a; color: white; font-size: 17px; cursor: pointer; transition: all 0.2s ease-in-out; }
        .answer-btn:hover { background-color: #444; }
        .balance { text-align: right; font-size: 22px; color: #00e676; font-weight: bold; margin-bottom: 35px; }
        #result { margin-top: 25px; padding-top: 18px; border-top: 2px dashed rgba(0, 230, 118, 0.4); font-size: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>SportMiner</h1>

    <!-- Блок онбординга (ВИДЕН при загрузке) -->
    <div id="onboarding-div" style="text-align:center; margin-bottom:30px;"> 
        <h1>СПОРТКОИН</h1>
        <p>Проект СПОРТМАЙНЕР приветствует тебя!</p>
        <p>Здесь твои знания спорта превращаются в монеты.</p>
        <button class="btn-start" id="start-btn">Начать!</button>
    </div>

    <!-- БЛОК ВЫБОРА СПОРТА -->
    <div id="sport-selection" class="match" style="display:none; margin-bottom:35px;"> 
        <p class="question">Выбери дисциплину:</p>
        <button class="answer-btn" onclick="selectSport('Футбол')">Футбол</button>
        <button class="answer-btn" onclick="selectSport('Хоккей')">Хоккей</button>
        <button class="answer-btn" onclick="selectSport('Баскетбол')">Баскетбол</button>
        <button class="answer-btn" onclick="selectSport('Киберспорт')">Киберспорт</button>
    </div>

    <!-- Блок баланса -->
    <div class="balance" id="main-balance" style="display:none;">Баланс: <span id="balance">1399.2</span> СПОРТКОИН</div>

    <!-- КОНТЕЙНЕР для матчей или заглушки (В НЁМ ВСЕГДА ЕСТЬ ЭЛЕМЕНТЫ) -->
    <div class="match" id="match-container">
        
        <!-- ЭЛЕМЕНТ ДЛЯ МАТЧА (скрыт по умолчанию) -->
        <div id="match-football" style="display:none;"> 
            <p><strong>Футбол</strong>: Зенит vs Спартак</p>
            <p style="color:#aaa;">Начало матча...</p>
            <p class="question">Кто победит?</p>
            <button class="answer-btn" onclick="makeBet(0)">Зенит</button>
            <button class="answer-btn" onclick="makeBet(1)">Ничья</button>
            <button class="answer-btn" onclick="makeBet(2)">Спартак</button>
        </div>

        <!-- ЭЛЕМЕНТ ДЛЯ ЗАГОГУЛКИ (скрыт по умолчанию) -->
        <div id="match-empty" style="display:none;"> 
            <p style="color:#aaa;">ЗДЕСЬ ПОКА ПУСТО</p>
            <p style="color:#aaa;">Данная дисциплина находится в разработке.</p>
            <button class="btn-start" onclick="goBack()">НАЗАД</button>
        </div>

    </div>

    <!-- Зеленый пунктир -->
    <div id="result"></div>
</div>

<script>
// --- НАЧАЛО ЛОГИКИ -- ПРОСТАЯ ВЕРСИЯ ---
let balance = parseFloat(1399.2);
let currentMatch = null;

const updateBalanceDisplay = () => {
    document.getElementById('balance').textContent = balance.toFixed(1);
};




function selectSport(sport) {
    // Прячем выбор спорта
    document.getElementById('sport-selection').style.display = 'none';
    
    // Прячем оба варианта контента в контейнере
    document.getElementById('match-football').style.display = 'none';
    document.getElementById('match-empty').style.display = 'none';

    if (sport === 'Футбол') {
         // Показываем баланс и матч
         document.getElementById('main-balance').style.display = 'block';
         document.getElementById('match-football').style.display = 'block'; // <-- ЭТА СТРОКА БЫЛА НУЖНА
         currentMatch = {resultIndex: Math.floor(Math.random() * 3)};
     } else {
         // Показываем только заглушку (баланс скрыт)
         document.getElementById('main-balance').style.display = 'none';
         document.getElementById('match-empty').style.display = 'block';
     }
}




function makeBet(index) {
    const COST = 0.1;
    if (balance < COST) {
        alert("Недостаточно СПОРТКОИН для ставки!");
        return;
    }
    balance -= COST;
    const isWin = (index === currentMatch.resultIndex);

    const resultDiv = document.getElementById('result');
    
    if (isWin) {
         const POOL = 100;
         balance += POOL;
         resultDiv.innerHTML = `<p class="win">🎉 Поздравляем! Вы угадали! Награда +${POOL} СПОРТКОИН.</p>`;
     } else {
         resultDiv.innerHTML = `<p class="lose">😞 Не угадали. Комиссия сожжена.</p>`;
     }
    
    updateBalanceDisplay();

    setTimeout(() => {
        resultDiv.innerHTML = '';
    }, 1500);
}

function goBack() {
     // Очищаем контейнер от старого контента перед возвратом
     document.getElementById('match-container').innerHTML = ''; // <-- ЭТА СТРОКА БЫЛА НУЖНА
     
     document.getElementById('sport-selection').style.display = 'block';
     document.getElementById('main-balance').style.display = 'none';
     document.getElementById('result').innerHTML = '';
}


// --- ГЛАВНАЯ ЛОГИКА ЗАПУСКА ---
// document.querySelector('.balance').style.display = 'none';
document.querySelector('#match-container').style.display = 'none'; 

document.getElementById('start-btn').addEventListener('click', () => {
    document.getElementById('onboarding-div').style.display = 'none';
    document.getElementById('sport-selection').style.display = 'block'; 
});


updateBalanceDisplay();
</script>
</body>
</html>
